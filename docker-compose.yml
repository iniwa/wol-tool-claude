services:
  wol-tool:
    image: ghcr.io/iniwa/wol-tool-claude:latest
    container_name: wol-tool
    restart: unless-stopped
    # WoL のマジックパケット (UDP 255.255.255.255:9) を LAN にブロードキャストするため host ネットワーク必須
    network_mode: host
    volumes:
      # SSD 上の bind mount。ホスト側で `mkdir -p` して 0700 で運用すること
      - /home/iniwa/docker/wol-tool/data:/data
    environment:
      - TZ=Asia/Tokyo
      - PORT=8080
      - DATA_PATH=/data/devices.json
      - PING_INTERVAL=30
      # Basic 認証（必須ではないが、外部公開時は必ず設定すること）
      # - AUTH_USER=admin
      # - AUTH_PASS=change-me
    deploy:
      resources:
        limits:
          memory: 128m
